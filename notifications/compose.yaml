services:
  ntfy:
    image: binwiederhier/ntfy:v2.26.0@sha256:a6d335064ae927c4dbef118e1fa39656b3d2e01472b2a82af5915d5cebfe815f
    container_name: ntfy
    command:
      - serve
    environment:
      TZ: ${TZ:-America/New_York}
      NTFY_BASE_URL: ${NTFY_BASE_URL:?required}
      NTFY_UPSTREAM_BASE_URL: ${NTFY_UPSTREAM_BASE_URL:-}
      NTFY_CACHE_FILE: /var/lib/ntfy/cache.db
      NTFY_CACHE_DURATION: 168h
      NTFY_AUTH_FILE: /var/lib/ntfy/auth.db
      NTFY_AUTH_DEFAULT_ACCESS: deny-all
      NTFY_ENABLE_LOGIN: "true"
      # Keep false while the origin is directly reachable on the LAN. Revisit
      # only with trusted-proxy restrictions during the public routing phase.
      NTFY_BEHIND_PROXY: ${NTFY_BEHIND_PROXY:-false}
    user: "${PUID:-1000}:${PGID:-1000}"
    volumes:
      - ./data:/var/lib/ntfy
    ports:
      - "192.168.5.252:8093:80"
    networks:
      notifications:
        aliases:
          - ntfy
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=16m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          wget -q --tries=1 http://127.0.0.1:80/v1/health -O - |
          grep -Eq '"healthy"[[:space:]]*:[[:space:]]*true'
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  apprise:
    image: caronc/apprise:v1.5.1@sha256:1871ed736799f6320d5061b72a60507f62c8747026e830175dc4b9f8adbf78dd
    container_name: apprise
    environment:
      TZ: ${TZ:-America/New_York}
      APPRISE_STATEFUL_MODE: disabled
      APPRISE_WORKER_COUNT: "1"
      APPRISE_ADMIN: "n"
      APPRISE_CONFIG_LOCK: "y"
      APPRISE_ATTACH_SIZE: "0"
    user: "${PUID:-1000}:${PGID:-1000}"
    expose:
      - "8000"
    networks:
      notifications:
        aliases:
          - apprise
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
      - /config:rw,noexec,nosuid,nodev,size=8m
      - /attach:rw,noexec,nosuid,nodev,size=8m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        - CMD
        - python3
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:8000/status', timeout=5).read()
      interval: 30s
      timeout: 6s
      retries: 5
      start_period: 30s

  discord-bridge:
    image: python:3.13-alpine@sha256:399babc8b49529dabfd9c922f2b5eea81d611e4512e3ed250d75bd2e7683f4b0
    container_name: ntfy-discord-bridge
    command:
      - python3
      - /app/bridge.py
    environment:
      TZ: ${TZ:-America/New_York}
      BRIDGE_NTFY_URL: ${BRIDGE_NTFY_URL:-http://ntfy}
      BRIDGE_STATE_MAX_AGE_SECONDS: ${BRIDGE_STATE_MAX_AGE_SECONDS:-180}
      BRIDGE_SUBSCRIBE_TIMEOUT_SECONDS: ${BRIDGE_SUBSCRIBE_TIMEOUT_SECONDS:-75}
      BRIDGE_RECONNECT_MAX_SECONDS: ${BRIDGE_RECONNECT_MAX_SECONDS:-30}
      BRIDGE_DISCORD_TIMEOUT_SECONDS: ${BRIDGE_DISCORD_TIMEOUT_SECONDS:-15}
      BRIDGE_DISCORD_MAX_ATTEMPTS: ${BRIDGE_DISCORD_MAX_ATTEMPTS:-5}
      BRIDGE_RETRY_MAX_SECONDS: ${BRIDGE_RETRY_MAX_SECONDS:-30}
      BRIDGE_SECRET_FILE: /run/secrets/discord_bridge_env
      BRIDGE_STATE_FILE: /data/state.json
    secrets:
      - source: discord_bridge_env
        target: discord_bridge_env
        uid: "1000"
        gid: "1000"
        mode: 0400
    user: "1000:1000"
    volumes:
      - ./discord-bridge/bridge.py:/app/bridge.py:ro
      - ./discord-bridge/data:/data
    networks:
      - notifications
    restart: unless-stopped
    init: true
    stop_grace_period: 90s
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=8m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        - CMD
        - python3
        - /app/bridge.py
        - --healthcheck
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s

networks:
  notifications:
    name: notifications
    driver: bridge

secrets:
  discord_bridge_env:
    file: ./discord-bridge/.env
