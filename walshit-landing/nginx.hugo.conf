worker_processes auto;
pid /tmp/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 512;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log /dev/stdout;
    server_tokens off;
    sendfile on;

    client_body_temp_path /tmp/client_temp;
    proxy_temp_path /tmp/proxy_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    server {
        listen 8080;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;
        autoindex off;

        # Every location below adds its own Cache-Control, and nginx only
        # inherits add_header directives from this server block when a
        # location defines none of its own -- so each location must also
        # explicitly include the reviewed security headers or it silently
        # loses them. See security-headers.conf.
        include /etc/nginx/security-headers.conf;

        error_page 404 /404.html;

        location = /404.html {
            internal;
            include /etc/nginx/security-headers.conf;
            add_header Cache-Control "no-cache" always;
        }

        location = /healthz.txt {
            try_files /healthz.txt =404;
            include /etc/nginx/security-headers.conf;
            add_header Cache-Control "no-cache" always;
        }

        location = / {
            try_files /index.html =404;
            include /etc/nginx/security-headers.conf;
            add_header Cache-Control "no-cache" always;
        }

        location ~* \.html$ {
            try_files $uri =404;
            include /etc/nginx/security-headers.conf;
            add_header Cache-Control "no-cache" always;
        }

        location ~* \.xml$ {
            try_files $uri =404;
            include /etc/nginx/security-headers.conf;
            add_header Cache-Control "no-cache" always;
        }

        location ~* \.(css|js)$ {
            try_files $uri =404;
            include /etc/nginx/security-headers.conf;
            add_header Cache-Control "public, max-age=3600" always;
        }

        location ~* \.png$ {
            try_files $uri =404;
            include /etc/nginx/security-headers.conf;
            add_header Cache-Control "public, max-age=86400" always;
        }

        location / {
            try_files $uri $uri/ =404;
            include /etc/nginx/security-headers.conf;
        }
    }
}
