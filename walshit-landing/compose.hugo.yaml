name: walshit-landing-hugo

services:
  landing-hugo:
    build:
      context: .
      dockerfile: Dockerfile.hugo
    image: walshit-landing-hugo:20260716-2
    platform: linux/amd64
    user: "101:101"
    ports:
      - "127.0.0.1:3004:8080"
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=16m,mode=1777
    cpus: "0.50"
    mem_limit: 64m
    pids_limit: 64
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "test \"$$(wget -qO- http://127.0.0.1:8080/healthz.txt)\" = \"walshit-landing-hugo-ok\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
