# qBittorrent behind Gluetun VPN (NordVPN-oriented)
# Created by Hermes for /home/port/stacks/qbittorrent-vpn.
# Fill .env before starting. Do not commit .env with real VPN/SMB credentials.

volumes:
  storage-share:
    driver_opts:
      type: cifs
      o: user=${SMB_USER},password=${SMB_PASSWORD},file_mode=0755,dir_mode=0755,rw,uid=${PUID:-1000},gid=${PGID:-1000}
      device: //${SMB_SERVER_IP}/${SMB_SHARE_NAME:-storage-share}

services:
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      # qBittorrent Web UI. Host port 8080 is already used by SABnzbd on this VM.
      - "${QBITTORRENT_WEBUI_PORT:-8081}:${QBITTORRENT_WEBUI_PORT:-8081}/tcp"
      # qBittorrent listening port. NordVPN does not provide usable port forwarding;
      # this only exposes the port locally/through the VPN container firewall.
      - "${QBITTORRENT_PORT:-8694}:${QBITTORRENT_PORT:-8694}/tcp"
      - "${QBITTORRENT_PORT:-8694}:${QBITTORRENT_PORT:-8694}/udp"
      # Old stack ports intentionally not published:
      # - 8888:8888/tcp  # HTTP proxy; conflicts with Dozzle on this VM
      # - 8388:8388/tcp  # Shadowsocks; enable only if needed
      # - 8388:8388/udp  # Shadowsocks; enable only if needed
    volumes:
      - ${BASE_PATH:-/home/port/stacks/qbittorrent-vpn/data}/gluetun:/gluetun
    environment:
      - TZ=${TZ:-America/New_York}
      - VPN_SERVICE_PROVIDER=${VPN_SERVICE_PROVIDER:-nordvpn}
      - VPN_TYPE=${VPN_TYPE:-wireguard}
      # NordVPN WireGuard/NordLynx: fill WIREGUARD_PRIVATE_KEY in .env.
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      # NordVPN OpenVPN fallback: set VPN_TYPE=openvpn and fill service credentials.
      # NordVPN requires manual-configuration service credentials, not normal login credentials.
      - OPENVPN_USER=${OPENVPN_USER}
      - OPENVPN_PASSWORD=${OPENVPN_PASSWORD}
      - OPENVPN_PROTOCOL=${OPENVPN_PROTOCOL:-udp}
      # Prefer broad location filters; SERVER_HOSTNAMES is brittle if Nord changes server lists.
      - SERVER_COUNTRIES=${SERVER_COUNTRIES:-United States}
      - SERVER_REGIONS=${SERVER_REGIONS}
      - SERVER_CITIES=${SERVER_CITIES}
      - SERVER_HOSTNAMES=${SERVER_HOSTNAMES}
      # Allow qBittorrent's listening port through Gluetun's firewall.
      - FIREWALL_VPN_INPUT_PORTS=${QBITTORRENT_PORT:-8694}
      # Keep Gluetun proxy/shadowsocks features off unless intentionally enabled later.
      - HTTPPROXY=off
      - SHADOWSOCKS=off
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_started
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/New_York}
      - WEBUI_PORT=${QBITTORRENT_WEBUI_PORT:-8081}
      - TORRENTING_PORT=${QBITTORRENT_PORT:-8694}
    volumes:
      - ${BASE_PATH:-/home/port/stacks/qbittorrent-vpn/data}/qbittorrent:/config
      - storage-share:/share:rw
    restart: unless-stopped
