volumes:
  storage-share:
    driver_opts:
      type: cifs
      o: user=${SMB_USER},password=${SMB_PASSWORD},file_mode=0755,dir_mode=0755,rw,uid=1000,gid=1000
      device: //${SMB_SERVER_IP}/storage-share
services:
  posterizarr:
    hostname: posterizarr
    container_name: posterizarr
    environment:
      - TZ=${TZ}
      - TERM=xterm
      - RUN_TIME=1:00,2:00,3:00,4:00,5:00,6:00,7:00,8:00,9:00,10:00,11:00,12:00,13:00,14:00,15:00,16:00,17:00,18:00,19:00,20:00,21:00,22:00,23:00
      # - "RUN_TIME=disabled"
    image: ghcr.io/fscorrupt/posterizarr:latest
    restart: unless-stopped
    user: 1000:1000
    volumes:
      - ${BASE_PATH}/posterizarr:/config
      - ${BASE_PATH}/posterizarr/assets:/assets
networks: {}
